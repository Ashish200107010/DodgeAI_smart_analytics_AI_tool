services:
  postgres:
    image: postgres:16
    container_name: dodgeai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dodgeai
    ports:
      - "5432:5432"
    volumes:
      - dodgeai_pgdata:/var/lib/postgresql/data
      # Runs only on first init of the volume
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init_db.sql:ro

volumes:
  dodgeai_pgdata:

